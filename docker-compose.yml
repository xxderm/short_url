services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: short_links_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
    networks:
      - short_links

  nginx:
    image: nginx:1.27-alpine
    container_name: short_links_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - short_links

  postgres:
    image: postgres:16-alpine
    container_name: short_links_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: short_links
      POSTGRES_USER: short_links
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - short_links

volumes:
  postgres_data:

networks:
  short_links:
    driver: bridge